# WebSocket upgrade mapping (Connection header echoes the Upgrade request).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI service (same-origin → httpOnly cookies work).
    # Upgrade headers let WebSocket (/api/ws/...) pass through for real-time collaboration.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
