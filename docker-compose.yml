services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legiferam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
      POSTGRES_DB: ${POSTGRES_DB:-legiferam}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legiferam} -d ${POSTGRES_DB:-legiferam}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Override DATABASE_URL host to the compose service name.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-legiferam}:${POSTGRES_PASSWORD:-change-me-in-prod}@db:5432/${POSTGRES_DB:-legiferam}
    # On first boot: run migrations, seed DEMO data, then serve.
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # API is reachable only on the internal compose network (the web nginx proxies
    # /api → api:8000). It is NOT published to the host in production; the dev override
    # adds a host port for Swagger. This keeps only the web port behind the reverse proxy.
    expose:
      - "8000"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    # The only public surface: the reverse proxy (NPM) forwards the domain here.
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres-data:
